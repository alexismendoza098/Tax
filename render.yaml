services:
  - type: web
    name: etaxes-plus
    env: node
    region: oregon
    rootDir: backend
    buildCommand: npm install --production
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: ETaxes2_0
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
